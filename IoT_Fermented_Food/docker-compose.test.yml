version: '3.8'

services:
  # Databases / Message Brokers
  mysql:
    image: mysql:8.0
    container_name: iot_mysql_test
    environment:
      - MYSQL_ROOT_PASSWORD=my-secret-pw
      - MYSQL_DATABASE=iot
    ports:
      - "33066:3306"
    volumes:
      - ./mysql-iot/initdb.sql:/docker-entrypoint-initdb.d/initdb.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:latest
    container_name: iot_mongo_test
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=secret
      - MONGO_INITDB_DATABASE=iot
    ports:
      - "37017:27017"
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: iot_rabbitmq_test
    environment:
      - RABBITMQ_DEFAULT_USER=user
      - RABBITMQ_DEFAULT_PASS=password
    ports:
      - "35672:5672"
      - "31567:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 20s
      timeout: 10s
      retries: 10

  # Microservices
  auth-ms:
    build:
      context: ./auth-ms
      dockerfile: Dockerfile
    container_name: iot_auth_ms_test
    environment:
      - MYSQL_HOSTNAME=mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_DATABASE_NAME=iot
      - MYSQL_ROOT_USERNAME=root
      - MYSQL_ROOT_PASSWORD=my-secret-pw
      - PORT=80
    ports:
      - "5005:80"
    depends_on:
      mysql:
        condition: service_healthy

  microcontrollers-ms:
    build:
      context: ./microcontrollers-ms
      dockerfile: Dockerfile
    container_name: iot_microcontrollers_ms_test
    environment:
      - MYSQL_HOSTNAME=mysql
      - MYSQL_SERVICE_PORT=3306
      - MYSQL_DATABASE_NAME=iot
      - MYSQL_ROOT_USERNAME=root
      - MYSQL_ROOT_PASSWORD=my-secret-pw
      - INTERNAL_API_KEY=testkey
      - PORT=80
    ports:
      - "36000:80"
    depends_on:
      mysql:
        condition: service_healthy

  measure-ms:
    build:
      context: ./measure-ms
      dockerfile: Dockerfile
    container_name: iot_measure_ms_test
    environment:
      - MONGO_HOSTNAME=mongo
      - MONGO_SERVICE_PORT=27017
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=secret
      - MONGO_DATABASE_NAME=iot
      - MICROCONTROLLERS_MS_HOSTNAME=microcontrollers-ms
      - MICROCONTROLLERS_MS_SERVICE_PORT=80
      - INTERNAL_API_KEY=testkey
      - PORT=80
    ports:
      - "34000:80"
    depends_on:
      mongo:
        condition: service_healthy

  orchestrator-ms:
    build:
      context: ./orchestrator-ms
      dockerfile: Dockerfile
    container_name: iot_orchestrator_ms_test
    environment:
      - AUTH_MS_HOSTNAME=auth-ms
      - AUTH_MS_SERVICE_PORT=80
      - MEASURE_MS_HOSTNAME=measure-ms
      - MEASURE_MS_SERVICE_PORT=80
      - MICROCONTROLLERS_MS_HOSTNAME=microcontrollers-ms
      - MICROCONTROLLERS_MS_SERVICE_PORT=80
      - AI_MS_HOSTNAME=ai-ms
      - AI_MS_SERVICE_PORT=5000
      - INTERNAL_API_KEY=testkey
      - JWT_SECRET=test_jwt_secret
      - RABBITMQ_HOSTNAME=rabbitmq
      - RABBITMQ_SERVICE_PORT=5672
      - RABBITMQ_DEFAULT_USER=user
      - RABBITMQ_DEFAULT_PASS=password
      - PORT=80
    ports:
      - "3000:80"
    depends_on:
      - auth-ms
      - measure-ms
      - microcontrollers-ms
      - ai-ms

  publisher-ms:
    build:
      context: ./publisher-ms
      dockerfile: Dockerfile
    container_name: iot_publisher_ms_test
    environment:
      - RABBITMQ_HOSTNAME=rabbitmq
      - RABBITMQ_SERVICE_PORT=5672
      - RABBITMQ_DEFAULT_USER=user
      - RABBITMQ_DEFAULT_PASS=password
      - MICROCONTROLLERS_MS_HOSTNAME=microcontrollers-ms
      - MICROCONTROLLERS_MS_SERVICE_PORT=80
      - INTERNAL_API_KEY=testkey
      - PORT=80
    ports:
      - "37000:80"
    depends_on:
      rabbitmq:
        condition: service_healthy

  stats-ms:
    build:
      context: ./stats-ms
      dockerfile: Dockerfile
    container_name: iot_stats_ms_test
    environment:
      - RABBITMQ_HOSTNAME=rabbitmq
      - RABBITMQ_SERVICE_PORT=5672
      - RABBITMQ_DEFAULT_USER=user
      - RABBITMQ_DEFAULT_PASS=password
      - ORCHESTRATOR_MS_HOSTNAME=orchestrator-ms
      - ORCHESTRATOR_MS_SERVICE_PORT=80
      - MONGO_DATABASE_NAME=iot
      - MONGO_HOSTNAME=mongo
      - MONGO_SERVICE_PORT=27017
      - MONGO_DEFAULT_USER=root
      - MONGO_DEFAULT_PASS=secret
      - PORT=80
    ports:
      - "38000:80"
    depends_on:
      rabbitmq:
        condition: service_healthy
      orchestrator-ms:
        condition: service_started

  ai-ms:
    build:
      context: ./ai-ms
      dockerfile: Dockerfile
    container_name: iot_ai_ms_test
    environment:
      - MONGO_URL=mongo
      - MONGO_USERNAME=root
      - MONGO_PASSWORD=secret
      - MONGO_DB=iot
      - INTERNAL_API_KEY=testkey
      - PYTHONUNBUFFERED=1
      - PORT=5000
    ports:
      - "5001:5000"
    volumes:
      - ./ai-ms/src:/app/src
    depends_on:
      mongo:
        condition: service_healthy

  integration-tests:
    build:
      context: ./integration-tests
      dockerfile: Dockerfile
    container_name: iot_integration_tests
    environment:
      - ORCHESTRATOR_URL=http://orchestrator-ms:80
      - MEASURE_MS_URL=http://measure-ms:80
      - RABBIT_URL=amqp://user:password@rabbitmq:5672
    depends_on:
      orchestrator-ms:
        condition: service_started
