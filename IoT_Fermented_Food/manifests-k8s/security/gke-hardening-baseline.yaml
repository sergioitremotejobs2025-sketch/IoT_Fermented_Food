# GKE Hardening Baseline: Security Posture Improvement
# This manifest implements core security principles for a production GKE environment.

# 1. Default Deny All Ingress/Egress
# By default, we deny all traffic and then explicitly allow what is needed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: default
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# 2. Allow Essential Ingress (DNS & Cluster Management)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-essential-dns
  namespace: default
spec:
  podSelector: {}
  policyTypes:
  - Egress
  ingress: []
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
# 3. Block Access to GCE Instance Metadata
# Prevents pods from accessing sensitive GCP metadata (service account keys, etc.)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: block-instance-metadata
  namespace: default
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
---
# 4. Service-to-Service Baseline (Example: Allow Ingress from Orchestrator)
# This replaces the previous internal-services-policy with a more restrictive version
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restricted-backend-access
  namespace: default
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: orchestrator-ms
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - podSelector:
        matchLabels:
          tier: db
