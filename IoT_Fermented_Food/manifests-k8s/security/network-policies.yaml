apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: orchestrator-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: orchestrator-ms
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {} # Allow all pods for now (or restrict to ingress controller if known)
    ports:
    - protocol: TCP
      port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: internal-services-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      tier: backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: orchestrator-ms
    - podSelector:
        matchLabels:
          app: stats-ms # stats-ms might need to talk to measure or micros
    - podSelector:
        matchLabels:
          app: prometheus # Allow prometheus to scrape
    ports:
    - protocol: TCP
      port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      tier: db
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          tier: backend
    ports:
    - protocol: TCP
      port: 3306 # MySQL
    - protocol: TCP
      port: 27017 # MongoDB
    - protocol: TCP
      port: 5672 # RabbitMQ
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
  namespace: default
spec:
  podSelector: {} # Allow all but only on port 80/metrics
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: prometheus
    ports:
    - protocol: TCP
      port: 80
