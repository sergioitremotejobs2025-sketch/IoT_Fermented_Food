apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: stats-ms
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "0"
        autoscaling.knative.dev/max-scale: "10"
        autoscaling.knative.dev/target: "50"
    spec:
      containers:
        - image: gcr.io/fermented-food/stats-ms:latest
          ports:
            - containerPort: 80
          env:
            - name: MONGO_HOSTNAME
              value: mongo
            - name: RABBITMQ_HOSTNAME
              value: rabbitmq
