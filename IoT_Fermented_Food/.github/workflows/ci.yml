name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  # Detect which microservices changed
  # ─────────────────────────────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changed.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed microservice directories
        id: changed
        run: |
          SERVICES=("ai-ms" "angular-ms" "auth-ms" "fake-arduino-iot-pictures" "measure-ms" "microcontrollers-ms" "orchestrator-ms" "publisher-ms" "stats-ms")
          CHANGED=()
          for svc in "${SERVICES[@]}"; do
            if git diff --name-only HEAD~1 HEAD | grep -q "^$svc/"; then
              CHANGED+=("$svc")
            fi
          done
          echo "Changed services: ${CHANGED[*]}"
          echo "services=$(echo "${CHANGED[*]}" | jq -Rc 'split(" ")')" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # Test changed microservices
  # ─────────────────────────────────────────────
  test:
    name: Test — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != ''
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      # Setup for Node.js services
      - name: Setup Node.js
        if: matrix.service == 'orchestrator-ms' || matrix.service == 'measure-ms' || matrix.service == 'microcontrollers-ms' || matrix.service == 'publisher-ms' || matrix.service == 'fake-arduino-iot-pictures'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '${{ matrix.service }}/package-lock.json'

      - name: Install & Test Node.js
        if: matrix.service == 'orchestrator-ms' || matrix.service == 'measure-ms' || matrix.service == 'microcontrollers-ms' || matrix.service == 'publisher-ms' || matrix.service == 'fake-arduino-iot-pictures'
        run: |
          cd ${{ matrix.service }}
          npm ci
          npm test

      # Setup for Python services
      - name: Setup Python
        if: matrix.service == 'stats-ms' || matrix.service == 'ai-ms'
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install & Test Python
        if: matrix.service == 'stats-ms' || matrix.service == 'ai-ms'
        run: |
          cd ${{ matrix.service }}
          pip install -r requirements.txt
          pytest

      # Setup for Go service
      - name: Setup Go
        if: matrix.service == 'auth-ms'
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.0'
          cache-dependency-path: 'auth-ms/go.sum'

      - name: Build & Test Go
        if: matrix.service == 'auth-ms'
        run: |
          cd auth-ms
          chmod +x check_coverage.sh
          ./check_coverage.sh

      # Setup for Angular service
      - name: Setup Node.js (Angular)
        if: matrix.service == 'angular-ms'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'angular-ms/iot-app/package-lock.json'

      - name: Install & Test Angular
        if: matrix.service == 'angular-ms'
        run: |
          cd angular-ms/iot-app
          npm ci
          npx ng test --watch=false --browsers=ChromeHeadlessCI --code-coverage
