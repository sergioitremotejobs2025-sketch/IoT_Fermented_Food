name: GHCR — Build & Publish Artifacts

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changed.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed microservice directories
        id: changed
        run: |
          SERVICES=("ai-ms" "angular-ms" "auth-ms" "fake-arduino-iot-pictures" "measure-ms" "microcontrollers-ms" "orchestrator-ms" "publisher-ms" "stats-ms")
          CHANGED=()
          # If it's a tag push, we want to build ALL services for the release
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            CHANGED=("${SERVICES[@]}")
          else
            for svc in "${SERVICES[@]}"; do
              if git diff --name-only HEAD~1 HEAD | grep -q "^$svc/"; then
                CHANGED+=("$svc")
              fi
            done
          fi
          
          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "services=[]" >> $GITHUB_OUTPUT
          else
            echo "services=$(echo "${CHANGED[*]}" | jq -Rc 'split(" ")')" >> $GITHUB_OUTPUT
          fi

  publish-to-ghcr:
    name: Publish to GHCR — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != ''
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
      fail-fast: false

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=edge,branch=main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          if [ "${{ matrix.service }}" = "angular-ms" ]; then
            echo "file=${{ matrix.service }}/Dockerfile.build" >> $GITHUB_OUTPUT
          else
            echo "file=${{ matrix.service }}/Dockerfile" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ${{ steps.dockerfile.outputs.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
