<h2 mat-dialog-title>Cambiar contraseña</h2>
<mat-dialog-content>
    <mat-form-field appearance="fill">
        <mat-label>Nueva contraseña</mat-label>
        <input matInput [(ngModel)]="password" type="password" required>
    </mat-form-field>
    <mat-form-field appearance="fill">
        <mat-label>Confirmar contraseña</mat-label>
        <input matInput [(ngModel)]="confirmPassword" type="password" required>
    </mat-form-field>
    <p *ngIf="password && confirmPassword && password !== confirmPassword" class="error-text">
        Las contraseñas no coinciden
    </p>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="onNoClick()">Cancelar</button>
    <button mat-button color="primary" [disabled]="!password || password !== confirmPassword" (click)="save()">
        Guardar
    </button>
</mat-dialog-actions>
