<mat-card class="history-card glass-container">
  <mat-card-header>
    <div mat-card-avatar class="header-icon">
      <mat-icon color="primary">history</mat-icon>
    </div>
    <mat-card-title>Historial de {{ micro?.measure === 'temperature' ? 'Temperatura' : 'Humedad' }}</mat-card-title>
    <mat-card-subtitle>{{ micro?.ip }}</mat-card-subtitle>

    <div class="header-actions">
      <div class="range-selector">
        <mat-button-toggle-group [value]="selectedRange" (change)="onRangeChange($event.value)">
          <mat-button-toggle value="24h">24h</mat-button-toggle>
          <mat-button-toggle value="7d">7 Días</mat-button-toggle>
          <mat-button-toggle value="30d">30 Días</mat-button-toggle>
        </mat-button-toggle-group>
      </div>

      <button mat-icon-button 
              color="accent" 
              (click)="exportData()" 
              [disabled]="isExporting || rawHistory.length === 0"
              matTooltip="Exportar a CSV">
        <mat-icon>{{ isExporting ? 'hourglass_empty' : 'download' }}</mat-icon>
      </button>
    </div>
  </mat-card-header>

  <mat-card-content>
    <div class="chart-wrapper">
      <canvas baseChart
        [data]="chartData"
        [options]="chartOptions"
        [type]="'line'">
      </canvas>
    </div>
  </mat-card-content>
</mat-card>
